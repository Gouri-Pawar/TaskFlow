<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — TaskFlow</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="dash-shell">

    <div class="dash-header">
      <div>
        <div class="auth-eyebrow">TaskFlow</div>
        <h1>Your tasks</h1>
      </div>
      <button class="btn-ghost" id="logout-btn">Log out</button>
    </div>

    <div class="stats-strip" id="stats-strip"></div>

    <div class="composer">
      <h2>Add a task</h2>
      <form id="create-form">
        <div class="composer-row">
          <div class="field">
            <input type="text" id="title" placeholder="Task title" required>
          </div>
          <div class="field">
            <input type="text" id="description" placeholder="Description (optional)">
          </div>
          <button type="submit" class="btn-primary">Add</button>
        </div>
      </form>
    </div>

    <div class="section-label">All tasks</div>
    <div id="tasks" class="task-list"></div>

  </div>

  <script>
    const API_BASE = "http://localhost:8080"; // change this when deploying

    const tasksEl = document.getElementById("tasks");
    const statsEl = document.getElementById("stats-strip");
    const token = localStorage.getItem("token");

    // No token at all — don't even try, straight to login.
    if (!token) {
      window.location.href = "login.html";
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str ?? "";
      return div.innerHTML;
    }

    function authedFetch(path, options = {}) {
      return fetch(`${API_BASE}${path}`, {
        ...options,
        headers: {
          ...(options.headers || {}),
          Authorization: "Bearer " + token
        }
      });
    }

    function goToLogin() {
      localStorage.removeItem("token");
      window.location.href = "login.html";
    }

    function renderStats(tasks) {
      const total = tasks.length;
      const completed = tasks.filter(t => t.completed).length;
      const pending = total - completed;
      const pct = total ? Math.round((completed / total) * 100) : 0;

      statsEl.innerHTML = `
        <div class="stat"><div class="stat-value">${total}</div><div class="stat-label">Total</div></div>
        <div class="stat"><div class="stat-value">${pending}</div><div class="stat-label">Pending</div></div>
        <div class="stat accent"><div class="stat-value">${completed}</div><div class="stat-label">Completed</div></div>
        <div class="stat accent"><div class="stat-value">${pct}%</div><div class="stat-label">Done</div></div>
      `;
    }

    function taskCardHtml(task) {
      const id = task.ID;
      const done = !!task.completed;
      return `
        <div class="task-card ${done ? "done" : ""}" data-id="${id}">
          <button class="task-toggle" data-action="toggle" title="${done ? "Mark as pending" : "Mark as done"}">${done ? "✓" : ""}</button>
          <div class="task-body">
            <h3>${escapeHtml(task.title)}</h3>
            ${task.description ? `<p>${escapeHtml(task.description)}</p>` : ""}
          </div>
          <div class="task-actions">
            <button class="icon-btn" data-action="edit">Edit</button>
            <button class="icon-btn danger" data-action="delete">Delete</button>
          </div>
        </div>
      `;
    }

    function editFormHtml(task) {
      const id = task.ID;
      return `
        <div class="task-card" data-id="${id}">
          <form class="edit-form" data-action="save-edit">
            <input type="text" class="edit-title" value="${escapeHtml(task.title)}" required>
            <input type="text" class="edit-description" value="${escapeHtml(task.description || "")}" placeholder="Description">
            <div class="edit-actions">
              <button type="submit" class="btn-primary">Save</button>
              <button type="button" class="icon-btn" data-action="cancel-edit">Cancel</button>
            </div>
          </form>
        </div>
      `;
    }

    async function loadTasks() {
      tasksEl.innerHTML = `<div class="state-block"><div class="state-title">Loading your tasks…</div></div>`;

      let response;
      try {
        response = await authedFetch("/get_tasks");
      } catch (err) {
        tasksEl.innerHTML = `<div class="state-block"><div class="state-title error">Can't reach the server</div>Check your connection and refresh.</div>`;
        return;
      }

      if (response.status === 401) {
        goToLogin();
        return;
      }

      const data = await response.json().catch(() => null);

      if (!response.ok || !Array.isArray(data)) {
        tasksEl.innerHTML = `<div class="state-block"><div class="state-title error">Couldn't load tasks</div>Something went wrong on our end. Try refreshing.</div>`;
        statsEl.innerHTML = "";
        return;
      }

      renderStats(data);

      if (data.length === 0) {
        tasksEl.innerHTML = `<div class="state-block"><div class="state-title">No tasks yet</div>Add your first task above to get started.</div>`;
        return;
      }

      tasksEl.innerHTML = data.map(taskCardHtml).join("");
    }

    async function toggleTask(id, nextCompleted, title, description) {
      await authedFetch(`/tasks/update?id=${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, description, completed: nextCompleted })
      });
      loadTasks();
    }

    async function saveEdit(id, title, description, completed) {
      await authedFetch(`/tasks/update?id=${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, description, completed })
      });
      loadTasks();
    }

    async function deleteTask(id) {
      if (!confirm("Delete this task? This can't be undone.")) return;
      await authedFetch(`/tasks/delete?id=${id}`, { method: "DELETE" });
      loadTasks();
    }

    // Event delegation — one listener handles toggle / edit / delete / save / cancel
    tasksEl.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-action]");
      if (!btn) return;
      const card = btn.closest(".task-card");
      const id = card.dataset.id;
      const action = btn.dataset.action;

      if (action === "delete") {
        deleteTask(id);
      } else if (action === "toggle") {
        const done = card.classList.contains("done");
        const title = card.querySelector(".task-body h3").textContent;
        const descEl = card.querySelector(".task-body p");
        toggleTask(id, !done, title, descEl ? descEl.textContent : "");
      } else if (action === "edit") {
        card.outerHTML = editFormHtml({
          ID: id,
          title: card.querySelector(".task-body h3").textContent,
          description: card.querySelector(".task-body p")?.textContent || ""
        });
      } else if (action === "cancel-edit") {
        loadTasks();
      }
    });

    tasksEl.addEventListener("submit", (e) => {
      const form = e.target.closest('[data-action="save-edit"]');
      if (!form) return;
      e.preventDefault();
      const card = form.closest(".task-card");
      const id = card.dataset.id;
      const title = form.querySelector(".edit-title").value.trim();
      const description = form.querySelector(".edit-description").value.trim();
      if (!title) return;
      saveEdit(id, title, description, false);
    });

    document.getElementById("create-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const titleEl = document.getElementById("title");
      const descEl = document.getElementById("description");
      const title = titleEl.value.trim();
      const description = descEl.value.trim();
      if (!title) return;

      await authedFetch("/tasks", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, description })
      });

      titleEl.value = "";
      descEl.value = "";
      loadTasks();
    });

    document.getElementById("logout-btn").addEventListener("click", goToLogin);

    loadTasks();
  </script>

</body>
</html>
