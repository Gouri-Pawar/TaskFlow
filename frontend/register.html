<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — TaskFlow</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-eyebrow">TaskFlow</div>
      <h1>Create your account</h1>

      <form id="register-form" novalidate>
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Your name" required autocomplete="name">
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 8 characters" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">Register</button>
        <p id="msg" class="msg"></p>
      </form>

      <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>

  <script>
    const API_BASE = "http://localhost:8080"; // change this when deploying

    const form = document.getElementById("register-form");
    const msgEl = document.getElementById("msg");
    const submitBtn = document.getElementById("submit-btn");

    function setMessage(text, type) {
      msgEl.textContent = text || "";
      msgEl.className = "msg" + (type ? " " + type : "");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!name || !email || !password) {
        setMessage("Fill in every field.", "error");
        return;
      }
      if (password.length < 8) {
        setMessage("Password must be at least 8 characters.", "error");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Creating account…";
      setMessage("");

      try {
        const response = await fetch(`${API_BASE}/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password })
        });

        const data = await response.json().catch(() => ({}));

        if (response.ok) {
          setMessage("Account created — redirecting to log in…", "success");
          setTimeout(() => { window.location.href = "login.html"; }, 1200);
          return;
        }

        setMessage(data.message || "Couldn't create that account. Try a different email.", "error");
      } catch (err) {
        setMessage("Can't reach the server. Check your connection and try again.", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Register";
      }
    });
  </script>

</body>
</html>
